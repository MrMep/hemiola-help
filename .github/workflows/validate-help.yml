name: Validate Help

on:
  push:
    branches: [main]
    paths:
      - 'help/**'
      - 'schema/**'
      - 'tools/**'
      - '.github/workflows/validate-help.yml'
  pull_request:
    paths:
      - 'help/**'
      - 'schema/**'
      - 'tools/**'
      - '.github/workflows/validate-help.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install jsonschema
      - run: python tools/validate_help.py
